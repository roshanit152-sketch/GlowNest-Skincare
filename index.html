<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Glow Nepal | Authentic Korean Skincare</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdf6f7; color: #333; margin: 0; padding: 0; }
        header { background: #ffccd5; padding: 2rem; text-align: center; color: #d63384; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: auto; }
        .product-card { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; transition: 0.3s; }
        .product-card:hover { transform: translateY(-10px); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
        .price { font-weight: bold; color: #d63384; font-size: 1.2rem; margin: 10px 0; }
        button { background: #d63384; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>K-Glow Nepal</h1>
    <p>Authentic Korean Beauty Delivered to Your Door</p>
</header>

<div class="container">
    <!-- Product 1 -->
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1596464408538-4e7339d224b7?auto=format&fit=crop&w=500&q=80" alt="Cosrx Snail Mucin">
        <h3>COSRX Snail Mucin 96</h3>
        <p class="price">Rs. 2,200</p>
        <button>Add to Cart</button>
    </div>

    <!-- Product 2 -->
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1620916566398-39f1143ab7be?auto=format&fit=crop&w=500&q=80" alt="Beauty of Joseon Sunscreen">
        <h3>BOJ Relief Sun: Rice + Probiotics</h3>
        <p class="price">Rs. 2,400</p>
        <button>Add to Cart</button>
    </div>

    <!-- Product 3 -->
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1556228578-0d85b1a4d571?auto=format&fit=crop&w=500&q=80" alt="Anua Toner">
        <h3>Anua Heartleaf 77% Toner</h3>
        <p class="price">Rs. 3,500</p>
        <button>Add to Cart</button>
    </div>
</div>

</body>
</html>
